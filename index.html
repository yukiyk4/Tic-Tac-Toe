<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Arcade Hub</title>
        <!-- Your main stylesheet -->
        <link rel="stylesheet" href="Main.css" />
    </head>
    <body>
        <!-- Top Navigation Bar -->
        <nav class="navbar">
            <div class="nav-brand">
                <div class="nav-logo">ArcadeHub</div>
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Dark Mode">🌙</button>
            </div>
            <ul class="nav-links">
                <li><a href="#" class="nav-item active" data-target="home-page">Home</a></li>
                <li><a href="#" class="nav-item" data-target="tictactoe-page">Tic-Tac-Toe</a></li>
                <li><a href="#" class="nav-item" data-target="snake-page">Snake</a></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="content-container">
            <!-- Home Page Section -->
            <section id="home-page" class="page-section active">
                <h1>Welcome to Arcade Hub!</h1>
                <p>Click on the **Tic-Tac-Toe** link in the navigation bar above to start playing.</p>
            </section>

            <!-- Game Page Section -->
            <section id="tictactoe-page" class="page-section">
                <div class="game-container">
                    <h1>Tic-Tac-Toe</h1>
                    <div class="status">Player X's turn</div>

                    <div class="board">
                        <div class="cell" data-index="0"></div>
                        <div class="cell" data-index="1"></div>
                        <div class="cell" data-index="2"></div>
                        <div class="cell" data-index="3"></div>
                        <div class="cell" data-index="4"></div>
                        <div class="cell" data-index="5"></div>
                        <div class="cell" data-index="6"></div>
                        <div class="cell" data-index="7"></div>
                        <div class="cell" data-index="8"></div>
                    </div>

                    <button class="reset-btn">Restart Game</button>
                </div>
            </section>

            <section id="snake-page" class="page-section">
                <div class="game-container">
                    <h1>Snake Game</h1>
                    <div class="status" id="snake-score">Score: 0</div>

                    <canvas
                        id="snakeCanvas"
                        width="400"
                        height="400"
                        style="
                            background-color: #ffffff;
                            border-radius: 8px;
                            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
                            display: block;
                            margin: 0 auto 25px auto;
                        "></canvas>

                    <button class="reset-btn" id="snake-reset-btn">Restart Game</button>
                </div>
            </section>
        </main>

        <!-- CRUCIAL: type="module" allows the use of import statements inside design.js -->
        <script type="module" src="Main.js"></script>
    </body>
</html>
